services:
  postgres:
    image: postgres:16-alpine
    container_name: pistemaster-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pistemaster}
      POSTGRES_USER: ${POSTGRES_USER:-pistemaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pistemaster123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pistemaster}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pistemaster-backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-default-key-change-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,172.23.164.197}
      POSTGRES_DB: ${POSTGRES_DB:-pistemaster}
      POSTGRES_USER: ${POSTGRES_USER:-pistemaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pistemaster123}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://localhost:8080,http://localhost:3001,http://172.23.164.197:8080}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - static_files:/app/staticfiles

  frontend:
    image: nginx:alpine
    container_name: pistemaster-frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - ./web_frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  static_files: