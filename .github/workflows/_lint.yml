name: Lint Code

on:
  workflow_call:

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web_frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./web_frontend
        run: npm ci

      - name: Run linter
        working-directory: ./web_frontend
        run: npm run lint

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run flake8
        run: flake8 backend/ core/ tests/ --exclude=venv,migrations,__pycache__

      - name: Run black (check)
        run: black backend/ core/ tests/ --exclude="venv|migrations" --check