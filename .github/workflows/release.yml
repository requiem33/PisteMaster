name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-desktop.yml
    with:
      configuration: Release

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: pistemaster-installer
          path: ./release/

      - name: List release files
        run: ls -la ./release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: PisteMaster v${{ steps.version.outputs.VERSION }}
          body: |
            ## PisteMaster v${{ steps.version.outputs.VERSION }}
            
            ### What's Changed
            See [CHANGELOG.md](./CHANGELOG.md) for details.
            
            ### Installation
            Download `PisteMaster-Setup-${{ steps.version.outputs.VERSION }}.exe` and run the installer.
            
            ### System Requirements
            - Windows 10 or later (64-bit recommended)
            - 500MB free disk space
            
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            ./release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version file
        run: |
          echo "${{ steps.version.outputs.VERSION }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: update version to ${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push || echo "Nothing to push"