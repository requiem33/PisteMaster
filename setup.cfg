[flake8]
max-line-length = 140
exclude =
    venv,
    .git,
    __pycache__,
    migrations,
    node_modules,
    .venv,
    env,
    build,
    dist,
    *.egg-info
extend-ignore =
    E203,
    W503
per-file-ignores =
    backend/PisteMaster/settings.py: F403, F401
    backend/PisteMaster/settings/__init__.py: F403, F405