[flake8]
max-line-length = 100
exclude =
    venv,
    .git,
    __pycache__,
    migrations,
    node_modules,
    .venv,
    env,
    build,
    dist,
    *.egg-info
extend-ignore =
    E203,  # Whitespace before ':' (conflicts with black)
    W503,  # Line break before binary operator (conflicts with black)
per-file-ignores =
    # Allow star imports in settings files
    backend/PisteMaster/settings.py: F403, F401
    backend/PisteMaster/settings/__init__.py: F403, F405