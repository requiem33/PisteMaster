apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}-env
  labels:
    {{- include "backend.labels" . | nindent 4 }}
data:
  DEBUG: {{ .Values.env.debug | quote }}
  ALLOWED_HOSTS: {{ .Values.env.allowedHosts | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.env.corsAllowedOrigins | quote }}
  CSRF_TRUSTED_ORIGINS: {{ .Values.env.csrfTrustedOrigins | quote }}
