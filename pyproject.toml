[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "PisteMaster.settings.development"
python_files = ["test_*.py"]
pythonpaths = [".", "backend"]
addopts = [
    "--cov=core",
    "--cov=backend",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-fail-under=75",
]

[tool.coverage.run]
source = ["core", "backend"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__pycache__/*",
    "*/venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.black]
line-length = 140
exclude = '''
/(
    venv
    | .venv
    | migrations
    | __pycache__
    | backend/dist
)/
'''